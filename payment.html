<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment - Food Delivery</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>


  <div class="container py-5">
    <h2 class="text-center mb-4">Your Cart</h2>

    <table class="table table-bordered">
      <thead class="table-dark">
        <tr>
          <th>Item Name</th>
          <th>Price (₹)</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="cartItems"></tbody>
    </table>

    <h4 class="text-end">Total: ₹<span id="totalAmount">0</span></h4>

    <div class="text-center mt-4">
      <button id="proceedBtn" class="btn btn-success">Proceed to Pay</button>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      const cartTable = document.getElementById('cartItems');
      const totalAmount = document.getElementById('totalAmount');
      const proceedBtn = document.getElementById('proceedBtn');

      function renderCart() {
        cartTable.innerHTML = "";
        let total = 0;

        cart.forEach((item, index) => {
          const row = document.createElement('tr');
          row.innerHTML = `
        <td>${item.name}</td>
        <td>₹${item.price}</td>
        <td>
          <button class="btn btn-danger btn-sm remove-btn" data-index="${index}">Remove</button>
        </td>
      `;
          cartTable.appendChild(row);
          total += item.price;
        });

        totalAmount.textContent = total.toFixed(2);

        if (cart.length === 0) {
          cartTable.innerHTML =
            `<tr><td colspan="3" class="text-center text-muted">Your cart is empty</td></tr>`;
        }
      }

      cartTable.addEventListener("click", (e) => {
        if (e.target.classList.contains("remove-btn")) {
          const index = e.target.getAttribute("data-index");
          cart.splice(index, 1);
          localStorage.setItem("cart", JSON.stringify(cart));
          renderCart();
        }
      });

      proceedBtn.addEventListener("click", () => {

        if (cart.length === 0) {
          alert("Your cart is empty!");
          return;
        }

        const user_email = localStorage.getItem("loggedInUser");

        if (!user_email) {
          alert("Please login first");
          window.location.href = "login.html";
          return;
        }

        const total = cart.reduce((sum, item) => sum + item.price, 0);

        fetch("http://localhost:3000/api/order", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            user_email: user_email,
            cart: cart,
            total: total
          })
        })
          .then(res => res.json())
          .then(data => {

            if (data.success) {
              localStorage.setItem("totalAmount", total);
              localStorage.removeItem("cart");
              window.location.href = "success.html";
            } else {
              alert("Order failed");
            }

          })
          .catch(err => {
            console.error(err);
            alert("Server error");
          });

      });

      renderCart();

    });   // ✅ THIS LINE WAS MISSING
  </script>

</body>

</html>
